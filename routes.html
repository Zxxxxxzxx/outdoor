<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>历史线路库</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --paper: rgba(255,255,255,0.56);
      --line: rgba(255,255,255,0.72);
      --line-soft: rgba(255,255,255,0.48);
      --ink: #25302d;
      --muted: #69726f;
      --caramel: #b8743f;
      --caramel-deep: #9e6230;
      --shadow: 0 24px 60px rgba(37, 48, 45, 0.08);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 16px 40px;
      background:
        radial-gradient(circle at top left, rgba(184, 116, 63, 0.08), transparent 24%),
        radial-gradient(circle at right top, rgba(228, 234, 228, 0.9), transparent 26%),
        linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.75;
    }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(1080px, 100%); margin: 0 auto; }
    .glass {
      background: var(--paper);
      border: 1px solid var(--line-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand-kicker {
      margin: 0 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--caramel);
      font-weight: 700;
    }
    .brand-title {
      margin: 0;
      font-size: clamp(28px, 4.4vw, 42px);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
    }
    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.56);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }
    .nav-btn.primary {
      background: var(--caramel);
      border-color: transparent;
      color: #fff9f3;
    }
    .hero {
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 16px;
    }
    .hero-title {
      margin: 0;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 800;
    }
    .hero-desc {
      margin: 12px 0 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 14px;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    .chip {
      border: 1px solid rgba(184, 116, 63, 0.14);
      background: rgba(255,255,255,0.48);
      color: #4a5853;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .chip.active {
      background: rgba(184, 116, 63, 0.16);
      color: var(--caramel-deep);
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.12fr;
      gap: 16px;
    }
    .list-card, .detail-card {
      border-radius: var(--radius-xl);
      padding: 20px;
    }
    .section-kicker {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--caramel);
      font-weight: 800;
    }
    .section-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    .route-list {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }
    .route-item {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.46);
      cursor: pointer;
    }
    .route-item.active {
      border-color: rgba(184, 116, 63, 0.28);
      background: rgba(255,255,255,0.64);
    }
    .route-item h3 {
      margin: 0 0 4px;
      font-size: 18px;
      letter-spacing: -0.03em;
    }
    .route-meta, .route-note {
      font-size: 13px;
      color: var(--muted);
    }
    .route-note { margin-top: 8px; }
    .detail-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }
    .detail-title {
      margin: 0;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }
    .detail-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(184, 116, 63, 0.14);
      color: var(--caramel-deep);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.46);
      border: 1px solid rgba(255,255,255,0.74);
    }
    .metric-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .block {
      margin-top: 12px;
      padding: 16px 18px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.46);
      border: 1px solid rgba(255,255,255,0.74);
    }
    .block h4 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: -0.02em;
    }
    .block p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .bullet-list {
      margin: 8px 0 0;
      padding-left: 18px;
      color: var(--ink);
      font-size: 14px;
    }
    .bullet-list li { margin: 6px 0; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(234, 215, 193, 0.36);
      border: 1px solid rgba(184, 116, 63, 0.14);
      color: var(--caramel-deep);
      font-size: 12px;
      font-weight: 700;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    @media (max-width: 620px) {
      body { padding: 18px 12px 30px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-head { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="brand-kicker">Route Archive</p>
        <h1 class="brand-title">历史线路库</h1>
      </div>
      <div class="nav-row">
        <a class="nav-btn" href="index.html">返回首页</a>
        <a class="nav-btn primary" href="./data/site.json">查看数据文件</a>
      </div>
    </header>

    <section class="hero glass">
      <p class="section-kicker">Route Archive</p>
      <h2 class="hero-title">每条线路都留下功课、风险和复盘。</h2>
      <p class="hero-desc" id="route-library-intro">每条路线一个页面。去一次补一次，把功课、风险、复盘都沉淀下来。</p>
      <div class="filter-row" id="region-filters"></div>
    </section>

    <div class="layout">
      <section class="list-card glass">
        <p class="section-kicker">Route List</p>
        <h2 class="section-title">线路列表</h2>
        <div class="route-list" id="route-list"></div>
      </section>

      <section class="detail-card glass">
        <div class="detail-head">
          <div>
            <p class="section-kicker">Route Detail</p>
            <h2 class="detail-title" id="detail-name">莫干山</h2>
            <div class="detail-sub" id="detail-region">浙江 · 湖州</div>
          </div>
          <div class="badge" id="detail-difficulty">★★★☆☆</div>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">距离</div>
            <div class="metric-value" id="detail-distance">12km</div>
          </div>
          <div class="metric">
            <div class="metric-label">爬升</div>
            <div class="metric-value" id="detail-elevation">800m+</div>
          </div>
          <div class="metric">
            <div class="metric-label">时长</div>
            <div class="metric-value" id="detail-duration">6-7h</div>
          </div>
          <div class="metric">
            <div class="metric-label">适合人群</div>
            <div class="metric-value" id="detail-suitable" style="font-size:14px">新手可报</div>
          </div>
        </div>

        <div class="block">
          <h4>天气规则</h4>
          <p id="detail-weather">雷暴、强对流、连续暴雨后取消；高温天缩线。</p>
        </div>

        <div class="block">
          <h4>行前功课</h4>
          <ul class="bullet-list" id="detail-prep"></ul>
        </div>

        <div class="block">
          <h4>线路风险</h4>
          <ul class="bullet-list" id="detail-risks"></ul>
        </div>

        <div class="block">
          <h4>常见动物 / 虫子</h4>
          <div class="pill-row" id="detail-animals"></div>
        </div>

        <div class="block">
          <h4>领队复盘</h4>
          <p id="detail-review-summary"></p>
          <ul class="bullet-list" id="detail-review-notes"></ul>
        </div>
      </section>
    </div>
  </div>

  <script src="./assets/site.js"></script>
  <script>
    let routes = [];
    let activeRegion = "全部";
    let activeRouteId = "";

    function getVisibleRoutes() {
      if (activeRegion === "全部") return routes;
      return routes.filter(route => route.region.startsWith(activeRegion));
    }

    function renderFilters() {
      const el = document.getElementById("region-filters");
      const regions = routeRegions(routes);
      el.innerHTML = regions.map(region => `
        <button class="chip ${region === activeRegion ? "active" : ""}" data-region="${region}">${region}</button>
      `).join("");
      [...el.querySelectorAll(".chip")].forEach(button => {
        button.addEventListener("click", () => {
          activeRegion = button.dataset.region;
          const visible = getVisibleRoutes();
          if (visible.length && !visible.find(route => route.id === activeRouteId)) activeRouteId = visible[0].id;
          renderFilters();
          renderRouteList();
          renderDetail();
        });
      });
    }

    function renderRouteList() {
      const el = document.getElementById("route-list");
      const visible = getVisibleRoutes();
      el.innerHTML = visible.map(route => `
        <div class="route-item ${route.id === activeRouteId ? "active" : ""}" data-id="${route.id}">
          <h3>${route.name}</h3>
          <div class="route-meta">${route.region} · ${route.distance} · ${route.elevation}</div>
          <div class="route-note">${route.review.summary}</div>
        </div>
      `).join("");
      [...el.querySelectorAll(".route-item")].forEach(card => {
        card.addEventListener("click", () => {
          activeRouteId = card.dataset.id;
          renderRouteList();
          renderDetail();
        });
      });
    }

    function renderList(containerId, items) {
      const el = document.getElementById(containerId);
      el.innerHTML = (items || []).map(item => `<li>${item}</li>`).join("");
    }

    function renderDetail() {
      const route = routes.find(item => item.id === activeRouteId) || routes[0];
      if (!route) return;
      document.getElementById("detail-name").textContent = route.name;
      document.getElementById("detail-region").textContent = route.region;
      document.getElementById("detail-difficulty").textContent = route.difficulty;
      document.getElementById("detail-distance").textContent = route.distance;
      document.getElementById("detail-elevation").textContent = route.elevation;
      document.getElementById("detail-duration").textContent = route.duration;
      document.getElementById("detail-suitable").textContent = route.suitable;
      document.getElementById("detail-weather").textContent = route.weather_rule;
      document.getElementById("detail-review-summary").textContent = route.review.summary;
      renderList("detail-prep", route.prep);
      renderList("detail-risks", route.risks);
      renderPills("detail-animals", route.animals, "pill");
      renderList("detail-review-notes", route.review.notes);
    }

    loadSiteData().then(data => {
      routes = data.routeLibrary.routes || [];
      activeRouteId = routes[0] ? routes[0].id : "";
      document.getElementById("route-library-intro").textContent = data.routeLibrary.intro || "";
      renderFilters();
      renderRouteList();
      renderDetail();
    }).catch(err => {
      console.error(err);
      document.body.innerHTML = "<div style='padding:40px;font-family:Inter,sans-serif;color:#25302d'>读取线路数据失败，请检查 data/site.json 是否存在。</div>";
    });
  </script>
</body>
</html>
